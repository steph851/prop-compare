databases: []

services:
  - type: web
    name: propintel
    env: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: "uvicorn api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PORT
        value: "8000"
      - key: PYTHONUNBUFFERED
        value: "1"
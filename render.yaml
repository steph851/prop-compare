services:
  - name: propintel
    type: web
    env: python
    region: oregon
    buildCommand: "pip install -r requirements.txt && pip install uvicorn[standard]"
    startCommand: "python -c \"from api import app; import uvicorn; uvicorn.run(app, host='0.0.0.0', port=8000)\""
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"